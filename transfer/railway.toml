[build]
builder = "NIXPACKS"
buildCommand = "cd 'front end coding' && npm install && npm run build && cd .. && pip install -r requirements.txt"

[deploy]
startCommand = "python nowtrend_integration.py --mode=api"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
